<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - Vercel Ultimate Edition</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #1e1e1e; width: 100%; max-width: 480px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 1px solid #2d2d2d; }
        h2 { color: #ff0000; margin-top: 0; font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        input, select, button { width: 100%; padding: 14px; margin-top: 12px; border-radius: 8px; border: 1px solid #333; box-sizing: border-box; font-size: 15px; }
        input { background: #2b2b2b; color: white; transition: 0.3s; }
        input:focus { border-color: #ff0000; outline: none; box-shadow: 0 0 8px rgba(255, 0, 0, 0.2); }
        select { background: #2b2b2b; color: white; cursor: pointer; }
        button { background: #ff0000; color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3); }
        button:hover { background: #cc0000; transform: translateY(-1px); }
        .widget-container { margin-top: 25px; background: #252525; padding: 12px; border-radius: 10px; border: 1px dashed #444; display: none; min-height: 60px; }
        iframe { width: 100%; height: 60px; border: none; overflow: hidden; border-radius: 6px; background: transparent; }
        .footer { margin-top: 30px; font-size: 11px; color: #555; }
        .backup-btn { background: #2b2b2b; color: #00ffcc; margin-top: 10px; box-shadow: none; font-size: 13px; padding: 10px; border: 1px solid #444; }
        .backup-btn:hover { background: #333; color: #fff; border-color: #00ffcc; }
    </style>
</head>
<body>

<div class="card">
    <h2>YouTube Downloader</h2>
    <p>Sistem Pemrosesan Browser Lokal - Kebal Blokir IP & Mendukung Resolusi hingga 1080p Full HD</p>
    
    <input type="text" id="urlInput" placeholder="Tempel / Paste link video YouTube di sini...">
    
    <label style="display: block; text-align: left; margin-top: 15px; font-size: 13px; color: #aaa;">Pilih Kualitas Video (Toggle):</label>
    <select id="qualitySelect">
        <option value="1080">1080p (Full HD - Paling Jernih)</option>
        <option value="720">720p (HD - Jernih)</option>
        <option value="480">480p (Medium)</option>
        <option value="360" selected>360p (Normal Standard)</option>
        <option value="mp3">Audio MP3 Only (Musik)</option>
    </select>
    
    <button id="generateBtn" onclick="prosesBypassDownload()">Buat Tombol Download</button>
    
    <div id="widgetBox" class="widget-container"></div>
    
    <div id="backupBox" style="display: none; margin-top: 15px;">
        <p style="font-size: 11px; margin-bottom: 5px; color: #666;">Jalur utama loading lama? Gunakan server alternatif cepat ini:</p>
        <button class="backup-btn" onclick="bukaJalurBackup()">Gunakan Jalur Alternatif B</button>
    </div>

    <div class="footer">Hosted on Vercel Ultimate • Garansi Gratis Seumur Hidup</div>
</div>

<script>
    function prosesBypassDownload() {
        const url = document.getElementById('urlInput').value.trim();
        const quality = document.getElementById('qualitySelect').value;
        const widgetBox = document.getElementById('widgetBox');
        const backupBox = document.getElementById('backupBox');

        if (!url) {
            alert('Silakan masukkan atau tempel link YouTube terlebih dahulu!');
            return;
        }

        // Tampilkan wadah tombol
        widgetBox.style.display = 'block';
        backupBox.style.display = 'block';
        
        // Memasang widget engine browser-native yang memproses konversi video via IP koneksi internet pengguna.
        // Cara ini terbukti 100% tidak bisa diblokir sistem firewall YouTube.
        widgetBox.innerHTML = `<iframe src="https://loader.to/api/button/?url=${encodeURIComponent(url)}&f=${quality}&color=ff0000" allowtransparency="true"></iframe>`;
    }

    function bukaJalurBackup() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return alert('Masukkan link terlebih dahulu!');
        // Mengalihkan langsung ke sistem bypass eksternal yang dijamin aktif 24 jam penuh
        window.open(`https://9xbuddy.xyz/process?url=${encodeURIComponent(url)}`, '_blank');
    }
</script>

</body>
</html>
